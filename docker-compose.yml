services:
  api:
    build:
      context: ./apps/api
    command: uv run uvicorn raceweek.main:app --host 0.0.0.0 --port 8000
    environment:
      RACEWEEK_DATABASE_PATH: /app/data/raceweek.duckdb
      RACEWEEK_DEMO_MODE: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./packages/fixtures:/workspace/packages/fixtures:ro
  web:
    build:
      context: ./apps/web
    command: pnpm start
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
