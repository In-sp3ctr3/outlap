openapi: 3.1.0
info:
  title: Outlap API
  version: 1.0.0
  description: Local-first API for fantasy motorsport strategy recommendations.
servers:
  - url: http://localhost:8000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/app/status:
    get:
      summary: Application status
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppStatus'
  /api/v1/onboarding/status:
    get:
      summary: Get first-run onboarding status and next route
      responses:
        '200':
          description: Onboarding status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingStatus'
  /api/v1/onboarding/mode:
    post:
      summary: Select demo or real-data mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataModeRequest'
      responses:
        '200':
          description: Selected data mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataModeResponse'
  /api/v1/data-mode:
    get:
      summary: Get current data mode
      responses:
        '200':
          description: Current data mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataModeResponse'
    put:
      summary: Force real-data mode and disable demo fallback
      responses:
        '200':
          description: Current data mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataModeResponse'
  /api/v1/readiness/optimizer:
    get:
      summary: Explain whether deterministic optimizer can run
      responses:
        '200':
          description: Optimizer readiness gates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizerReadiness'
  /api/v1/data-sources/status:
    get:
      summary: List data-source health states
      responses:
        '200':
          description: Data-source health states
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DataSourceStatus'
  /api/v1/providers:
    get:
      summary: List configured AI providers
      responses:
        '200':
          description: Providers
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProviderConfig'
  /api/v1/providers/test:
    post:
      summary: Test an AI provider configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderTestRequest'
      responses:
        '200':
          description: Provider test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderTestResponse'
  /api/v1/fantasy/import/team:
    post:
      summary: Import a fantasy team snapshot manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/FantasyTeamSnapshot'
                - $ref: '#/components/schemas/CsvTeamImportRequest'
      responses:
        '201':
          description: Imported team snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResult'
  /api/v1/fantasy/import/market:
    post:
      summary: Import a fantasy market snapshot manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/FantasyMarketImportRequest'
                - $ref: '#/components/schemas/CsvMarketImportRequest'
      responses:
        '201':
          description: Imported market snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResult'
  /api/v1/fantasy/import/scores:
    post:
      summary: Import fantasy score snapshots manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/FantasyScoresImportRequest'
                - $ref: '#/components/schemas/CsvScoresImportRequest'
      responses:
        '201':
          description: Imported score snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResult'
  /api/v1/fantasy/sync:
    post:
      summary: Sync configured fantasy data sources
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncRequest'
      responses:
        '202':
          description: Sync accepted or completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncResult'
  /api/v1/fantasy/read-only/status:
    get:
      summary: Get read-only fantasy connector requirements and import alternatives
      responses:
        '200':
          description: Read-only fantasy connector status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FantasyReadOnlyStatus'
  /api/v1/fantasy/sync-requirements:
    get:
      summary: Get Fantasy sync environment requirements
      responses:
        '200':
          description: Fantasy sync requirements
          content:
            application/json:
              schema:
                type: object
  /api/v1/sync/fantasy-game:
    post:
      summary: Sync read-only Fantasy game catalog, scores, and optional picked team data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FantasySyncRequest'
      responses:
        '200':
          description: Fantasy sync result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FantasySyncResponse'
  /api/v1/fantasy/public-form/backfill:
    post:
      summary: Backfill public race-derived form features
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FantasyBackfillRequest'
      responses:
        '200':
          description: Public form feature backfill result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicFormBackfillResponse'
  /api/v1/fantasy/scores/backfill:
    post:
      deprecated: true
      summary: Deprecated alias for public race-derived form backfill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FantasyBackfillRequest'
      responses:
        '200':
          description: Deprecated response with scoreCount fixed at zero
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FantasyBackfillResponse'
  /api/v1/sync/race-context:
    post:
      summary: Sync public race context from OpenF1 and Jolpica
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                season: { type: integer }
                meetingKey: { type: string }
      responses:
        '200':
          description: Race context sync result
          content:
            application/json:
              schema:
                type: object
                required: [status, rowCount, sourceSnapshotIds, currentEventId]
                properties:
                  status: { type: string, enum: [ok, degraded] }
                  rowCount: { type: integer }
                  currentEventId: { type: string }
                  sourceSnapshotIds:
                    type: array
                    items: { type: string }
  /api/v1/fantasy/market:
    get:
      summary: List loaded real fantasy market/catalog assets
      responses:
        '200':
          description: Real loaded fantasy market assets plus freshness
          content:
            application/json:
              schema:
                type: object
                required: [items, freshness]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/FantasyAsset'
                  freshness:
                    $ref: '#/components/schemas/DataFreshness'
  /api/v1/onboarding/teams/select:
    post:
      summary: Save one to three current fantasy teams from loaded market assets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingTeamSelectionRequest'
      responses:
        '201':
          description: Saved current team slots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingTeamSelectionResponse'
  /api/v1/fantasy/assets:
    get:
      summary: List fantasy assets for an event
      parameters:
        - in: query
          name: eventId
          schema: { type: string }
        - in: query
          name: assetType
          schema: { type: string, enum: [driver, constructor] }
      responses:
        '200':
          description: Fantasy assets
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/FantasyAsset'
  /api/v1/fantasy/scores:
    get:
      summary: List fantasy asset scores for an event
      parameters:
        - in: query
          name: eventId
          schema: { type: string }
        - in: query
          name: assetId
          schema: { type: string }
      responses:
        '200':
          description: Fantasy score snapshots
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/FantasyAssetScore'
  /api/v1/fantasy/teams/current:
    get:
      summary: Get current user fantasy teams
      responses:
        '200':
          description: Current teams
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/FantasyTeamSnapshot'
  /api/v1/races:
    get:
      summary: List race meetings
      parameters:
        - in: query
          name: season
          schema: { type: integer }
      responses:
        '200':
          description: Race meetings
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RaceMeeting'
  /api/v1/races/current:
    get:
      summary: Get current or next race meeting
      responses:
        '200':
          description: Current race meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RaceMeeting'
  /api/v1/races/{meetingKey}/sessions:
    get:
      summary: List sessions for a meeting
      parameters:
        - in: path
          name: meetingKey
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Sessions
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RaceSession'
  /api/v1/races/{meetingKey}/intelligence:
    get:
      summary: Get race-week intelligence bundle
      parameters:
        - in: path
          name: meetingKey
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Race-week intelligence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RaceWeekIntelligence'
  /api/v1/projections/run:
    post:
      summary: Run projections for an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectionRunRequest'
      responses:
        '201':
          description: Projection run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectionRunResult'
  /api/v1/projections/runs/{projectionRunId}:
    get:
      summary: Get projection run
      parameters:
        - in: path
          name: projectionRunId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Projection run result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectionRunResult'
  /api/v1/optimizer/recommendations:
    post:
      summary: Generate ranked strategy recommendations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptimizerRequest'
      responses:
        '201':
          description: Recommendation run result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationRunResult'
  /api/v1/recommendations/runs/{recommendationRunId}:
    get:
      summary: Get recommendation run
      parameters:
        - in: path
          name: recommendationRunId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Recommendation run result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationRunResult'
  /api/v1/leagues/import:
    post:
      summary: Import league/rival data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/LeagueImportRequest'
                - $ref: '#/components/schemas/CsvLeagueImportRequest'
      responses:
        '201':
          description: Import result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResult'
  /api/v1/leagues/{leagueId}/analysis:
    get:
      summary: Get league analysis
      parameters:
        - in: path
          name: leagueId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: League analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeagueAnalysis'
  /api/v1/agent/conversations:
    post:
      summary: Create agent conversation
      responses:
        '201':
          description: Conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConversation'
  /api/v1/agent/conversations/{conversationId}:
    get:
      summary: Get agent conversation
      parameters:
        - in: path
          name: conversationId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConversation'
  /api/v1/agent/chat:
    post:
      summary: Send a message to the strategy assistant
      parameters:
        - in: query
          name: stream
          schema: { type: boolean, default: false }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentChatRequest'
      responses:
        '200':
          description: Chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentChatResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok] }
    AppStatus:
      type: object
      required: [version, setupComplete, databaseReady]
      properties:
        version: { type: string }
        setupComplete: { type: boolean }
        databaseReady: { type: boolean }
        currentEventId: { type: string }
    DataMode:
      type: string
      enum: [unset, demo, real]
    DataModeRequest:
      type: object
      required: [mode]
      properties:
        mode: { type: string, enum: [demo, real] }
        allowDemoFallback: { type: boolean, default: false }
    DataModeResponse:
      type: object
      required: [mode, allowDemoFallback]
      properties:
        mode:
          $ref: '#/components/schemas/DataMode'
        allowDemoFallback: { type: boolean }
    OnboardingStatus:
      type: object
      required: [firstRunCompleted, mode, nextRoute, setupComplete, needsRealData]
      properties:
        firstRunCompleted: { type: boolean }
        mode:
          $ref: '#/components/schemas/DataMode'
        nextRoute: { type: string }
        setupComplete: { type: boolean }
        needsRealData: { type: boolean }
    ReadinessIssue:
      type: object
      required: [key, label, message, recommendedAction]
      properties:
        key: { type: string }
        label: { type: string }
        message: { type: string }
        recommendedAction: { type: string }
    OptimizerReadiness:
      type: object
      required: [ready, blockingReasons, warnings, canRunWithWarnings]
      properties:
        ready: { type: boolean }
        blockingReasons:
          type: array
          items:
            $ref: '#/components/schemas/ReadinessIssue'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ReadinessIssue'
        canRunWithWarnings: { type: boolean }
    DataSourceStatus:
      type: object
      required: [source, status]
      properties:
        source: { type: string }
        status: { type: string, enum: [ok, stale, degraded, error, disabled, unknown] }
        lastSuccessfulSyncAt: { type: string, format: date-time }
        lastAttemptedSyncAt: { type: string, format: date-time }
        freshnessSeconds: { type: integer }
        message: { type: string }
        errorCode: { type: string }
    DataFreshness:
      type: object
      required: [key, label, status, sourceMode, staleAfterSeconds, recordCount, isBlocking, message]
      properties:
        key: { type: string }
        label: { type: string }
        status:
          type: string
          enum: [real_current, real_stale, demo, missing, partial, error, unknown]
        sourceKey: { type: string }
        sourceMode:
          type: string
          enum: [real, manual, advanced_token, demo, none]
        lastSuccessAt: { type: string, format: date-time }
        lastAttemptAt: { type: string, format: date-time }
        ageSeconds: { type: integer }
        staleAfterSeconds: { type: integer }
        recordCount: { type: integer }
        isDemo: { type: boolean }
        isBlocking: { type: boolean }
        message: { type: string }
    DataInputPath:
      type: object
      required: [label, endpoint, method, primary]
      properties:
        label: { type: string }
        endpoint: { type: string }
        method: { type: string, enum: [GET, POST] }
        contentType: { type: string }
        primary: { type: boolean }
    FantasyReadOnlyStatus:
      type: object
      required:
        - source
        - status
        - message
        - baseUrlConfigured
        - gameVersionConfigured
        - sessionTokenConfigured
        - requiredEnvVars
        - documentedEndpoints
        - structuredJsonImport
        - csvFallback
        - canMutateFantasyAccount
      properties:
        source: { type: string }
        status: { type: string, enum: [ok, stale, degraded, error, disabled, unknown] }
        message: { type: string }
        baseUrlConfigured: { type: boolean }
        gameVersionConfigured: { type: boolean }
        sessionTokenConfigured: { type: boolean }
        requiredEnvVars:
          type: array
          items: { type: string }
        documentedEndpoints:
          type: array
          items: { type: string }
        structuredJsonImport:
          $ref: '#/components/schemas/DataInputPath'
        csvFallback:
          $ref: '#/components/schemas/DataInputPath'
        canMutateFantasyAccount: { type: boolean }
    ProviderConfig:
      type: object
      required: [providerName, displayName, enabled]
      properties:
        providerName: { type: string }
        displayName: { type: string }
        baseUrl: { type: string }
        defaultModel: { type: string }
        apiKeyEnvVar: { type: string }
        enabled: { type: boolean }
        supportsStreaming: { type: boolean }
        supportsTools: { type: boolean }
        keyConfigured: { type: boolean }
    ProviderTestRequest:
      type: object
      required: [providerName]
      properties:
        providerName: { type: string }
        model: { type: string }
    ProviderTestResponse:
      type: object
      required: [ok, providerName, message]
      properties:
        ok: { type: boolean }
        providerName: { type: string }
        latencyMs: { type: integer }
        message: { type: string }
    FantasyAsset:
      type: object
      required: [assetId, assetType, displayName, priceMillions]
      properties:
        assetId: { type: string }
        externalId: { type: string }
        assetType: { type: string, enum: [driver, constructor] }
        displayName: { type: string }
        shortName: { type: string }
        abbreviation: { type: string }
        constructorName: { type: string }
        teamColor:
          type: string
          pattern: '^#[0-9A-Fa-f]{6}$'
        priceMillions: { type: number }
        fantasyPoints: { type: number }
        ownershipPct: { type: number }
        selectedByPct: { type: number }
        pointsPerMillion: { type: number }
        riskScore: { type: number }
        sourceSnapshotId: { type: string }
    FantasyAssetScore:
      type: object
      required: [assetId, eventId, capturedAt]
      properties:
        assetId: { type: string }
        eventId: { type: string }
        fantasyPoints: { type: number }
        ownershipPct: { type: number }
        selectedByPct: { type: number }
        capturedAt: { type: string, format: date-time }
        sourceSnapshotId: { type: string }
    FantasyTeamSnapshot:
      type: object
      required: [teamSnapshotId, teamName, eventId, costCapMillions, freeTransfers, assets, chips]
      properties:
        teamSnapshotId: { type: string }
        teamName: { type: string }
        eventId: { type: string }
        slot: { type: integer }
        costCapMillions: { type: number }
        budgetUsedMillions: { type: number }
        budgetRemainingMillions: { type: number }
        freeTransfers: { type: integer }
        transferPenaltyPoints: { type: number, default: 10 }
        assets:
          type: array
          items:
            $ref: '#/components/schemas/TeamAsset'
        chips:
          type: array
          items:
            $ref: '#/components/schemas/ChipState'
        capturedAt: { type: string, format: date-time }
    OnboardingTeamSlotSelection:
      type: object
      required: [slot, teamName, assetIds]
      properties:
        slot: { type: integer, minimum: 1, maximum: 3 }
        teamName: { type: string, minLength: 1 }
        assetIds:
          type: array
          minItems: 7
          maxItems: 7
          items: { type: string }
        costCapMillions: { type: number, default: 100, minimum: 0 }
        freeTransfers: { type: integer, default: 2, minimum: 0 }
        transferPenaltyPoints: { type: number, default: 10, minimum: 0 }
    OnboardingTeamSelectionRequest:
      type: object
      required: [eventId, teams]
      properties:
        eventId: { type: string }
        teams:
          type: array
          minItems: 1
          maxItems: 3
          items:
            $ref: '#/components/schemas/OnboardingTeamSlotSelection'
    OnboardingTeamSelectionResponse:
      type: object
      required: [items, freshness]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FantasyTeamSnapshot'
        freshness:
          $ref: '#/components/schemas/DataFreshness'
    FantasySyncRequest:
      type: object
      required: [gamePeriodId]
      properties:
        gamePeriodId: { type: string }
        season: { type: integer }
        leagueId: { type: string }
        userGlobalId: { type: string }
        slot: { type: integer, minimum: 1, maximum: 3 }
    FantasySyncResponse:
      type: object
      required: [status, assetCount, scoreCount, teamCount, sourceSnapshotId, message]
      properties:
        status: { type: string, enum: [ok, degraded] }
        assetCount: { type: integer }
        scoreCount: { type: integer }
        teamCount: { type: integer }
        sourceSnapshotId: { type: string }
        message: { type: string }
    FantasyBackfillRequest:
      type: object
      required: [season]
      properties:
        season: { type: integer }
        throughRound: { type: integer, minimum: 1 }
        eventId: { type: string }
    FantasyBackfillResponse:
      type: object
      required: [status, scoreCount, sourceSnapshotId, message]
      properties:
        status: { type: string, enum: [ok, degraded] }
        scoreCount: { type: integer }
        sourceSnapshotId: { type: string }
        message: { type: string }
    PublicFormBackfillResponse:
      type: object
      required: [status, featureCount, sourceSnapshotId, message]
      properties:
        status: { type: string, enum: [ok, degraded] }
        featureCount: { type: integer }
        sourceSnapshotId: { type: string }
        message: { type: string }
    TeamAsset:
      type: object
      required: [assetId, assetType]
      properties:
        assetId: { type: string }
        assetType: { type: string, enum: [driver, constructor] }
        boostMultiplier: { type: number, default: 1 }
    ChipState:
      type: object
      required: [chipName, status]
      properties:
        chipName: { type: string }
        status: { type: string, enum: [available, used, active, unavailable, unknown] }
        usedEventId: { type: string }
    ImportResult:
      type: object
      required: [status, itemCount, sourceSnapshotId, message]
      properties:
        status: { type: string, enum: [imported, updated] }
        itemCount: { type: integer }
        sourceSnapshotId: { type: string }
        message: { type: string }
        warnings:
          type: array
          items: { type: string }
    FantasyMarketImportRequest:
